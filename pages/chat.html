<div id="giscus-container"></div>

<script>
blog.addLoadEvent(function() {
  // 确保 darkMode 有默认值
  const isDark = (window.blog && typeof blog.darkMode !== 'undefined') 
    ? blog.darkMode 
    : window.matchMedia('(prefers-color-scheme: dark)').matches;
  
  // 创建 script 元素的标准方式
  const script = document.createElement('script');
  script.src = 'https://giscus.app/client.js';
  script.dataset.repo = 'luohuilong/giscus';
  script.dataset.repoId = 'R_kgDOOxE7TA';
  script.dataset.category = 'Announcements';
  script.dataset.categoryId = 'DIC_kwDOOxE7TM4Cqnxv';
  script.dataset.mapping = 'pathname';
  script.dataset.strict = '1';
  script.dataset.reactionsEnabled = '0';
  script.dataset.emitMetadata = '0';
  script.dataset.inputPosition = 'top';
  script.dataset.theme = isDark ? 'dark' : 'light';
  script.dataset.lang = 'zh-CN';
  script.crossOrigin = 'anonymous';
  script.async = true;

  // 安全插入到容器
  const container = document.getElementById('giscus-container');
  while (container.firstChild) {
    container.removeChild(container.firstChild);
  }
  container.appendChild(script);
  
  console.log('Giscus loaded with theme:', isDark ? 'dark' : 'light');
});
</script>
