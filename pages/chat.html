<div id="giscus-root"></div>

<script>
blog.addLoadEvent(function() {
  // 确保 blog.js 已加载
  if (!window.blog) {
    console.error('blog.js 未加载');
    return;
  }

  // 使用 blog.darkMode 的当前值
  const isDark = blog.darkMode;

  const container = document.getElementById('giscus-root');
  if (!container) return;

  // 防止重复加载
  if (container.querySelector('script[src*="giscus.app"]')) {
    return;
  }

  const script = document.createElement('script');
  script.src = 'https://giscus.app/client.js';
  script.dataset.repo = 'luohuilong/giscus';
  script.dataset.repoId = 'R_kgDOOxE7TA';
  script.dataset.category = 'Announcements';
  script.dataset.categoryId = 'DIC_kwDOOxE7TM4Cqnxv';
  script.dataset.mapping = 'pathname';
  script.dataset.strict = '1';
  script.dataset.reactionsEnabled = '0';
  script.dataset.emitMetadata = '0';
  script.dataset.inputPosition = 'top';
  script.dataset.theme = isDark ? 'dark' : 'light';
  script.dataset.lang = 'zh-CN';
  script.crossOrigin = 'anonymous';
  script.async = true;

  container.appendChild(script);
  
  console.log('[Giscus] 加载主题:', isDark ? 'dark' : 'light');
});
</script>
