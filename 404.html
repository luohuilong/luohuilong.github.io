<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>404 Not Found</title>
<style type="text/css">body{background-color:;margin-top:100px;text-align:center;}#errorType{font-family:Verdana,Arial,Helvetica,sans-serif;color:;}.box{margin:0 auto;border:0;cellpadding:8;cellspacing:0;width:460px;}#content{font-family:Verdana,Arial,Helvetica,sans-serif;font-size:12px;font-weight:normal;color:;line-height:18px;border:1px solid #CCCCCC;background-color:#EEEEEE;}</style>
</head>
<body>
<h1><p id="errorType">404 Not Found</p></h1>
<div class="box">
<div id="content">
<p>The requested URL was not found on this server.</p>
</div>
</div>
<script>function jump() {window.location.href=window.location.protocol+"//"+window.location.host+"/#errorType=404&refer="+window.location.href;} setTimeout("jump()",10000);</script>
</body>
</html>
